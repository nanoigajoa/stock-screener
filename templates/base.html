<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StockScope{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css">
  <link rel="stylesheet" href="/static/css/base.css">
  {% block extra_css %}{% endblock %}
</head>
<body>

  <nav class="navbar">
    <a class="nav-logo" href="/">
      <span class="nav-logo-icon">📈</span> StockScope
    </a>
    <div class="nav-links">
      <a href="/about" class="nav-link {% if active_page == 'about' %}active{% endif %}">About</a>
      <a href="/screen" class="nav-link nav-cta {% if active_page == 'screen' %}active{% endif %}">Screening</a>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
