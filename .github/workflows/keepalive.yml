name: Keep Alive

on:
  schedule:
    # 매 10분마다 ping (UTC 기준, 장 시간대 집중)
    # 한국 기준: 평일 22:00~06:00 (미장 Pre/Regular/After)
    - cron: "*/10 12-21 * * 1-5"  # UTC 12~21시 = KST 21~06시 (평일)
    - cron: "*/14 0-11,22-23 * * *"  # 그 외 시간대는 14분 간격 (슬립 방지)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          echo "Pinging ${{ secrets.RENDER_URL }}"
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "${{ secrets.RENDER_URL }}/health")
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "Warning: server returned $response"
            exit 1
          fi
