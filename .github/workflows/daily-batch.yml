name: Daily Batch Refresh

on:
  schedule:
    # 매일 KST 07:00 = UTC 22:00 (전날)
    # 미장 마감(04:00 KST) 후 데이터 정리, 장 시작(23:30 KST) 전 준비
    - cron: "0 22 * * 0-4"   # 일~목 UTC 22:00 (월~금 KST 07:00)
  workflow_dispatch:
    inputs:
      force:
        description: "캐시 무시하고 강제 갱신"
        required: false
        default: "false"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Wake up server
        run: |
          echo "Waking up server..."
          # 슬립 상태일 수 있으므로 최대 2분 대기하며 재시도
          for i in $(seq 1 8); do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 20 \
              "${{ secrets.RENDER_URL }}/health" || echo "000")
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Server is awake."
              break
            fi
            sleep 15
          done

      - name: Trigger macro refresh
        run: |
          curl -sf --max-time 30 \
            "${{ secrets.RENDER_URL }}/api/refresh/macro" \
            -H "X-Refresh-Token: ${{ secrets.REFRESH_TOKEN }}" \
            && echo "Macro refresh triggered." \
            || echo "Macro refresh endpoint not available (server will refresh on next request)."

      - name: Verify server health
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${{ secrets.RENDER_URL }}/health")
          echo "Final health check: HTTP $status"
          [ "$status" = "200" ]
